<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <link rel="stylesheet" href="style.css">

    <title>Contact Us</title>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light" style="background: var(--primary);">
        <a class="navbar-brand font-weight-bold" href="#">Angelina's Salon</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item px-2">
                    <a class="nav-link font-weight-bold" href="index.html">Home</a>
                </li>
                <li class="nav-item px-2">
                    <a class="nav-link font-weight-bold" href="services.html">Services</a>
                </li>
                <li class="nav-item px-2">
                    <a class="nav-link font-weight-bold" href="aboutus.html">About Us</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container py-5">

        <h2 class="text-center mb-4">Contact Us</h2>

        <div class="row justify-content-center">
            <div class="col-md-6">

                <form>
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <input type="email" class="form-control" placeholder="Email Address" required>
                    </div>

                    <div class="form-group">
                        <textarea class="form-control" rows="5" placeholder="Your Message"></textarea>
                    </div>

                    <button class="btn btn-block" style="background: var(--accent); color: white;">
                        Submit
                    </button>
                </form>

            </div>
        </div>

    </div>    

</body>

</html>
